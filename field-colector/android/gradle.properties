# Cap heap + no persistent daemon: JVM exits after each Gradle invocation (flutter run / build).
# Lower parallel work to reduce RAM spikes on constrained machines.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=128m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=true
android.useAndroidX=true